version: 2

models:
  - name: stg_jobs
    description: "Cleaned and normalized job postings from Adzuna API"
    columns:

      - name: job_id
        description: "Unique identifier for each job posting"
        tests:
          - not_null       # every row must have a job_id
          - unique         # no two rows can have the same job_id

      - name: job_title
        description: "Title of the job posting"
        tests:
          - not_null       # every job must have a title

      - name: company_name
        description: "Name of the hiring company"
        # no not_null here — some postings legitimately hide the company name

      - name: location
        description: "Job location as returned by the API"

      - name: salary_min
        description: "Minimum salary if provided"

      - name: salary_max
        description: "Maximum salary if provided"

      - name: created_at
        description: "Timestamp when the job was posted"

      - name: job_description
        description: "Full job description text containing skill requirements"